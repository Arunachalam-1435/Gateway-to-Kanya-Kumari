<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Hotels - Kanyakumari Tourism</title>
    <link rel="stylesheet" href="../css/hotels.css">
</head>
<body>
    <header id="header"></header>
    <main class="hotels-container">
        <!-- Search & Filter Bar -->
        <section class="search-filter">
            <input type="text" placeholder="Search hotels...">
            <button class="search-btn">🔍 Search</button>
        </section>
        <!-- Hotels Grid -->
        <section class="hotels-grid">
            <!-- Hotel Card -->
            <div class="hotel-card">
                <div class="hotel-image" style="background-image: url('hotel-image.jpg');">
                    <span class="price-tag">₹3,500/night</span>
                </div>
                <div class="hotel-details">
                    <h3>Ocean View Residency</h3>
                    <p>📍 Near Sunrise Point</p>
                    <button class="book-btn">Book Room</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
