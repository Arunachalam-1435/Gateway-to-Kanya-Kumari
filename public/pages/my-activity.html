<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activity - Kanyakumari Tourism</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/activity.css">
</head>
<body>
    <header id="header"></header>
    <main class="activity-container">
        <div class="activity-header">
            <h1>My Activity</h1>
            <div class="tab-controls">
                <button class="tab-btn active" data-tab="bookings">🏨 Hotel Bookings</button>
                <button class="tab-btn" data-tab="orders">🛍️ Artisan Orders</button>
            </div>
        </div>
        <!-- Bookings Tab -->
        <section id="bookings" class="tab-content active">
        </section>
        <!-- Orders Tab -->
        <section id="orders" class="tab-content">
        </section>
    </main>
    <footer id="main-footer"></footer>
    <script src="../js/page.js"></script>
    <script src="../js/user.js"></script>
</body>
</html>
