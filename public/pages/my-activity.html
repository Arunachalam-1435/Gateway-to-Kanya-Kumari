<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Activity - Kanyakumari Tourism</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/activity.css">
</head>
<body>
    <header id="main-header"></header>

    <main class="activity-container">
        <div class="activity-header">
            <h1>My Activity</h1>
            <div class="tab-controls">
                <button class="tab-btn active" onclick="openTab('bookings')">🏨 Hotel Bookings</button>
                <button class="tab-btn" onclick="openTab('orders')">🛍️ Artisan Orders</button>
            </div>
        </div>

        <!-- Bookings Tab -->
        <section id="bookings" class="tab-content active">
            <div class="activity-card">
                <div class="status-badge confirmed">Confirmed</div>
                <div class="card-details">
                    <h3>Sea View Residency</h3>
                    <p>📅 15th April - 17th April 2026</p>
                    <p>👥 2 Adults, 1 Room</p>
                </div>
                <div class="card-actions">
                    <button class="secondary-btn">View Voucher</button>
                    <button class="cancel-btn">Cancel</button>
                </div>
            </div>
        </section>

        <!-- Orders Tab -->
        <section id="orders" class="tab-content">
            <div class="activity-card">
                <div class="status-badge processing">Processing</div>
                <div class="card-details">
                    <h3>Order #KK-8821</h3>
                    <p>📦 1x Polished Conch Shell, 2x Wood Carvings</p>
                    <p>💰 Total: ₹2,850</p>
                </div>
                <div class="card-actions">
                    <button class="secondary-btn">Track Order</button>
                </div>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>
    <script src="../js/page.js"></script>
    <script>
        function openTab(tabName) {
            // Hide all content
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Remove active class from buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show current
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
