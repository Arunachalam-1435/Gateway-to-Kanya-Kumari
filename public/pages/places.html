<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Attractions - Kanyakumari</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/places.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
</head>
<body>
    <header id="header"></header>
    <main class="places-container">
        <!-- Main Grid Container -->
          <div class="places-header">
                <h1>Explore Kanyakumari</h1>
                <p>Discover breathtaking landmarks where three oceans meet, brought to you by Gateway to Kanya Kumari.</p>
            </div>
        <div id="places-list" class="places-grid">
        </div>
        <div id="route-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="target-place-name">Navigation</h3>
                    <button class="close-modal" onclick="document.getElementById('route-modal').style.display='none'">&times;</button>
                </div>
                <div id="map" style="height: 100%; width: 100%;"></div>
                <div class="modal-footer">
                    <p>Showing route from your current location</p>
                </div>
            </div>
        </div>
    </main>
    <footer id="main-footer"></footer>
    <script src="../js/page.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
