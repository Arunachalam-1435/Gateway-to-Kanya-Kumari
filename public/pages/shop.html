<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Marketplace - Kanyakumari</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/shop.css">
</head>
<body>
    <header id="header"></header>
    <div class="shop-container">
        <!-- Sidebar Filters -->
        <aside class="shop-sidebar">
            <h3>Categories</h3>
            <ul>
                <li><input type="checkbox" id="seashell"> <label for="seashell">Seashell Art</label></li>
                <li><input type="checkbox" id="wood"> <label for="wood">Wood Carvings</label></li>
                <li><input type="checkbox" id="textile"> <label for="textile">Handloom</label></li>
            </ul>
            <hr>
            <h3>Price Range</h3>
            <input type="range" min="100" max="5000" value="2500" class="price-slider">
            <p>Under ₹2500</p>
        </aside>

        <!-- Product Grid -->
        <main class="product-area">
            <div class="shop-header">
                <h2>Local Handicrafts</h2>
                <span class="item-count">12 Items Found</span>
            </div>

            <div class="product-grid">
                <!-- Product Card 1 -->
                <div class="product-card">
                    <div class="product-image">🐚</div>
                    <div class="product-info">
                        <h4>Polished Conch Shell</h4>
                        <p class="price">₹450</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>

                <!-- Product Card 2 -->
                <div class="product-card">
                    <div class="product-image">🗿</div>
                    <div class="product-info">
                        <h4>Wooden Statue</h4>
                        <p class="price">₹1,200</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>

                <!-- Product Card 3 -->
                <div class="product-card">
                    <div class="product-image">👕</div>
                    <div class="product-info">
                        <h4>Traditional Handloom</h4>
                        <p class="price">₹850</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <footer id="main-footer"></footer>
    <script src="../js/page.js"></script>
</body>
</html>
