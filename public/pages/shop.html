<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Marketplace - Kanyakumari</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/shop.css">
</head>
<body>
    <header id="header"></header>
    <!-- Main Marketplace Area -->
    <main class="shop-container">
        <div class="shop-header">
            <h2>Handcrafted in Kanyakumari</h2>
            <p>Support local artisans, brought to you by Gateway to Kanya Kumari.</p>
        </div>
        <!-- This is where your JS will inject the product cards -->
        <div id="product-container" class="product-grid">
            <!-- 
               Your JS should inject this structure:
               <div class="product-card">
                   <img src="URL" alt="Name" class="product-img">
                   <div class="product-info">
                       <h3>Name</h3>
                       <p class="price">₹Price</p>
                       <span class="stock-info">Quantity Units Left</span>
                       <button class="add-to-cart-btn">Add to Cart</button>
                   </div>
               </div>
            -->
        </div>
    </main>
    <footer id="main-footer"></footer>
    <script type="module" src="../js/page.js"></script>
</body>
</html>
