<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sign Up - Kanyakumari Tourism</title>
      <link rel="stylesheet" href="../css/style.css">
  </head>
  <body style="background: #fdf2e9; display: flex; flex-direction: column; min-height: 100vh;">
    <header id="main-header"></header>
    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
      <div class="login-card">
        <h2>Start Your Journey</h2>
        <p>Create an account to save your favorite spots and artisan orders</p>
        <form id="signup-form" action="/register" method="POST">
          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>
          <div class="input-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" placeholder="Enter your email" required>
          </div>
          <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" placeholder="Create a password" required>
          </div>
          <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Repeat your password" required>
          </div>
          <button type="submit" class="login-btn">Join Now</button>
        </form>
        <p class="signup-link">Already a member? <a href="/home#login-section">Login here</a></p>
      </div>
    </main>
    <footer id="main-footer"></footer>
    <script src="../js/page.js"></script>
  </body>
</html>
